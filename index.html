<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FI Freedom Calculator</title>
    <!-- Simple styling to make it look like a professional app -->
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: #7f8c8d; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #219150; }
        #result { margin-top: 25px; padding: 20px; border-radius: 8px; background: #e8f5e9; display: none; }
        .highlight { color: #27ae60; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>FI SIP Calculator</h2>
    
    <div class="input-group">
        <label>Initial Investment (₹)</label>
        <input type="number" id="initial" value="0">
    </div>
    
    <div class="input-group">
        <label>Monthly SIP Amount (₹)</label>
        <input type="number" id="sip" value="50000">
    </div>
    
    <div class="input-group">
        <label>Annual Step-Up (%)</label>
        <input type="number" id="stepup" value="10">
    </div>
    
    <div class="input-group">
        <label>Expected Return Rate (% p.a.)</label>
        <input type="number" id="returns" value="12">
    </div>
    
    <div class="input-group">
        <label>Target Corpus (₹ Cr)</label>
        <input type="number" id="target" value="10">
    </div>

    <button onclick="calculateWealth()">Calculate My Path</button>

    <div id="result">
        <p id="corpusText"></p>
        <p id="fiText"></p>
    </div>
</div>

<script>
function calculateWealth() {
    // 1. Get values from inputs
    let initial = parseFloat(document.getElementById('initial').value);
    let sip = parseFloat(document.getElementById('sip').value);
    let stepUpPercentage = parseFloat(document.getElementById('stepup').value) / 100;
    let annualRate = parseFloat(document.getElementById('returns').value) / 100;
    let targetCr = parseFloat(document.getElementById('target').value) * 10000000;
    
    let monthlyRate = annualRate / 12;
    let totalWealth = initial;
    let months = 0;
    let currentSip = sip;

    // 2. The Logic Loop: Calculate month by month until we hit the target or 40 years
    while (totalWealth < targetCr && months < 480) {
        months++;
        
        // Add returns to existing money
        totalWealth = totalWealth * (1 + monthlyRate);
        
        // Add the SIP contribution
        totalWealth += currentSip;
        
        // Every 12 months, increase the SIP amount (Step-up)
        if (months % 12 === 0) {
            currentSip = currentSip * (1 + stepUpPercentage);
        }
    }

    // 3. Display Result
    let years = (months / 12).toFixed(1);
    document.getElementById('result').style.display = 'block';
    document.getElementById('corpusText').innerHTML = `Projected Wealth: <span class="highlight">₹${(totalWealth / 10000000).toFixed(2)} Cr</span>`;
    
    if (totalWealth >= targetCr) {
        document.getElementById('fiText').innerHTML = `You will reach your goal in <span class="highlight">${years} years</span>.`;
    } else {
        document.getElementById('fiText').innerHTML = `You won't hit the target within 40 years. Try increasing your SIP or Step-up.`;
    }
}
</script>

</body>
</html>
