<!-- FIRST: LINK THE CHART.JS LIBRARY (This must go before your own script) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// We need to keep track of the chart object so we can delete it 
// before drawing a new one (avoids overlapping charts).
let myChart = null; 

function calculateWealth() {
    // 1. (KEEP THE SAME) Get values from inputs
    let initial = parseFloat(document.getElementById('initial').value) || 0;
    let sip = parseFloat(document.getElementById('sip').value) || 0;
    let stepUpPercentage = (parseFloat(document.getElementById('stepup').value) || 0) / 100;
    let annualRate = (parseFloat(document.getElementById('returns').value) || 0) / 100;
    let targetCr = (parseFloat(document.getElementById('target').value) || 0) * 10000000;
    
    let monthlyRate = annualRate / 12;
    let totalWealth = initial;
    let months = 0;
    let currentSip = sip;

    // NEW VARIABLES FOR CHART DATA
    let chartLabelsYear = []; // X-axis (Years)
    let wealthDataPoints = []; // Y-axis (Total Value)
    
    // Track the initial status
    chartLabelsYear.push(0);
    wealthDataPoints.push(totalWealth / 10000000); // Store in Cr

    // 2. The Logic Loop: Calculate month by month until target OR 40 years
    while (totalWealth < targetCr && months < 480) {
        months++;
        
        // Add returns to existing money
        totalWealth = totalWealth * (1 + monthlyRate);
        
        // Add the SIP contribution
        totalWealth += currentSip;
        
        // Every 12 months, do two things:
        if (months % 12 === 0) {
            // A. Increase the SIP amount (Step-up)
            currentSip = currentSip * (1 + stepUpPercentage);
            
            // B. RECORD DATA FOR THE CHART (Year by year)
            let currentYear = months / 12;
            chartLabelsYear.push(`Year ${currentYear}`);
            wealthDataPoints.push(totalWealth / 10000000); // Store in Cr
        }
    }

    // 3. Display Result Text (KEEP THIS)
    let years = (months / 12).toFixed(1);
    document.getElementById('result').style.display = 'block';
    document.getElementById('corpusText').innerHTML = `Projected Wealth: <span class="highlight">₹${(totalWealth / 10000000).toFixed(2)} Cr</span>`;
    
    if (totalWealth >= targetCr) {
        document.getElementById('fiText').innerHTML = `You will reach your goal in <span class="highlight">${years} years</span>.`;
    } else {
        document.getElementById('fiText').innerHTML = `You won't hit the target within 40 years. Try increasing your SIP or Step-up.`;
    }

    // ==========================================
    // 4. DRAW THE CHART (New Section)
    // ==========================================
    
    // First, check if a chart already exists, if so, destroy it.
    if (myChart) {
        myChart.destroy();
    }

    // Connect to the canvas element
    const ctx = document.getElementById('myWealthChart').getContext('2d');
    
    // Configure the chart
    myChart = new Chart(ctx, {
        type: 'line', // This is a line chart
        data: {
            labels: chartLabelsYear, // X-axis labels
            datasets: [{
                label: 'Total Wealth (₹ Cr)', // Legend
                data: wealthDataPoints, // Y-axis values
                borderColor: '#27ae60', // Line color
                backgroundColor: 'rgba(39, 174, 96, 0.1)', // Fill under the line
                borderWidth: 3,
                tension: 0.3, // Makes the line curved and smooth
                fill: true // Fill the area underneath
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false, // Important for our CSS container
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return '₹' + value + ' Cr'; // Formats the Y-axis labels
                        }
                    }
                }
            },
            plugins: {
                legend: {
                    position: 'top',
                }
            }
        }
    });
}
</script>
