<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FI Freedom Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; margin-bottom: 4px; color: #7f8c8d; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f5e9; display: none; text-align: center; }
        .highlight { color: #27ae60; font-weight: bold; font-size: 18px; }
        .chart-container { margin-top: 20px; height: 250px; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2>FI SIP Calculator</h2>
    <div class="input-group"><label>Initial Investment (₹)</label><input type="number" id="initial" value="0"></div>
    <div class="input-group"><label>Monthly SIP (₹)</label><input type="number" id="sip" value="50000"></div>
    <div class="input-group"><label>Annual Step-Up (%)</label><input type="number" id="stepup" value="10"></div>
    <div class="input-group"><label>Expected Return (%)</label><input type="number" id="returns" value="12"></div>
    <div class="input-group"><label>Target Corpus (₹ Cr)</label><input type="number" id="target" value="10"></div>

    <button onclick="calculateWealth()">Calculate Wealth</button>

    <div id="result">
        <p id="corpusText"></p>
        <p id="fiText"></p>
    </div>

    <div class="chart-container">
        <canvas id="myWealthChart"></canvas>
    </div>
</div>

<script>
let myChart = null;

function calculateWealth() {
    try {
        let initial = parseFloat(document.getElementById('initial').value) || 0;
        let sip = parseFloat(document.getElementById('sip').value) || 0;
        let stepUp = (parseFloat(document.getElementById('stepup').value) || 0) / 100;
        let rate = (parseFloat(document.getElementById('returns').value) || 0) / 100;
        let target = (parseFloat(document.getElementById('target').value) || 0) * 10000000;

        let total = initial;
        let currentSip = sip;
        let months = 0;
        let labels = [0];
        let dataPoints = [initial / 10000000];

        while (total < target && months < 480) {
            months++;
            total = (total * (1 + (rate / 12))) + currentSip;
            if (months % 12 === 0) {
                currentSip *= (1 + stepUp);
                labels.push("Yr " + (months / 12));
                dataPoints.push(total / 10000000);
            }
        }

        document.getElementById('result').style.display = 'block';
        document.getElementById('corpusText').innerHTML = `Final Wealth: <span class="highlight">₹${(total / 10000000).toFixed(2)} Cr</span>`;
        document.getElementById('fiText').innerText = `Time: ${(months / 12).toFixed(1)} years`;

        if (myChart) myChart.destroy();
        const ctx = document.getElementById('myWealthChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Wealth (Cr)',
                    data: dataPoints,
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39,174,96,0.1)',
                    fill: true,
                    tension: 0.2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    } catch (e) {
        alert("Error: " + e.message);
    }
}
</script>
</body>
</html>
